<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlyphFlow Output</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/glyphflow.css">
</head>
<body>
    <div class="page-shell">
        <header class="topbar">
            <div class="brand-block">
                <h1 class="brand-mark">GlyphFlow</h1>
                <p class="brand-caption">Your generated handwriting preview is ready.</p>
            </div>
            <a href="/" class="status-pill"><span></span> Create another</a>
        </header>

        <main class="screen">
            <section class="result-card">
                <div class="result-inner">
                    <p class="section-label">Generation complete</p>
                    <p class="result-copy">Compare your uploaded sample with the generated output below.</p>

                    <div class="comparison-grid">
                        <figure class="compare-card">
                            <figcaption class="compare-label">Uploaded sample</figcaption>
                            <a href="/download?filename=static/uploaded_input.png" class="image-download" aria-label="Download uploaded sample" title="Download uploaded sample">&#x2B07;</a>
                            <img src="/static/uploaded_input.png" alt="Uploaded handwriting sample" class="result-image">
                        </figure>

                        <figure class="compare-card">
                            <figcaption class="compare-label">Generated output</figcaption>
                            <a href="/download?filename=static/generated.png" class="image-download" aria-label="Download generated image" title="Download generated image">&#x2B07;</a>
                            <img src="/static/generated.png" alt="Generated handwriting output" class="result-image">
                        </figure>
                    </div>

                    <div class="button-row">
                        <a href="/" class="button-secondary">Back to studio</a>
                    </div>
                </div>
            </section>
        </main>
    </div>
</body>
</html>
