<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlyphFlow</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/glyphflow.css">
</head>
<body>
    <div class="page-shell">
        <header class="topbar">
            <div class="brand-block">
                <h1 class="brand-mark">GlyphFlow</h1>
            </div>
            <div class="status-pill"><span></span> Image attachment required</div>
        </header>

        <main class="hero-stage">
            <section class="hero-card" aria-label="Handwriting generation introduction">
                <div class="hero-grid">
                    <div class="typing-wrap" aria-live="polite" aria-atomic="true">
                        <div class="typing-word"><span id="typing-word"></span><span class="typing-cursor" aria-hidden="true"></span></div>
                    </div>
                    <p class="hero-copy">
                        Attach a handwriting sample, enter your prompt, and generate a personal script in a minimal chat-style workspace.
                    </p>
                </div>
            </section>
        </main>

        <form action="/submit" method="post" enctype="multipart/form-data" class="composer" id="composer-form">
            <div class="composer-panel">
                <div class="composer-row">
                    <div class="composer-head">
                        <button type="button" class="attach-button icon-button" id="attach-button" aria-label="Attach image">+</button>
                        <textarea class="message-input" id="message" name="message" placeholder="Type the text you want in your handwriting..." required></textarea>
                        <button type="submit" class="send-button icon-button" id="send-button" disabled aria-label="Send message">➜</button>
                    </div>

                    <div class="composer-foot">
                        <div class="file-chip" id="file-chip"><strong>No file attached</strong></div>
                        <p class="small-text">PNG, JPG, or WEBP</p>
                    </div>

                    <input class="hidden-input" type="file" name="image" accept="image/*" id="image" required>
                </div>
            </div>
        </form>

        <div class="generation-overlay" id="generation-overlay" aria-hidden="true">
            <div class="generation-loader" role="status" aria-live="polite">
                <span class="generation-spinner" aria-hidden="true"></span>
                <p class="generation-text">Generating your handwriting output...</p>
            </div>
        </div>
    </div>

    <script>
        const typingWord = document.getElementById("typing-word");
        const phraseList = ["What should I write?", "Attach handwriting.", "Type any text.", "GlyphFlow"];
        const fileInput = document.getElementById("image");
        const attachButton = document.getElementById("attach-button");
        const sendButton = document.getElementById("send-button");
        const fileChip = document.getElementById("file-chip");
        const messageInput = document.getElementById("message");
        const composerForm = document.getElementById("composer-form");
        const generationOverlay = document.getElementById("generation-overlay");
        let isSubmitting = false;

        const wait = (milliseconds) => new Promise((resolve) => window.setTimeout(resolve, milliseconds));

        async function typePhrase(phrase) {
            for (let index = 0; index <= phrase.length; index += 1) {
                typingWord.textContent = phrase.slice(0, index);
                await wait(70);
            }

            await wait(600);

            for (let index = phrase.length; index >= 0; index -= 1) {
                typingWord.textContent = phrase.slice(0, index);
                await wait(26);
            }

            await wait(180);
        }

        async function runTypingLoop() {
            while (true) {
                for (const phrase of phraseList) {
                    await typePhrase(phrase);
                }
            }
        }

        function updateAttachmentState() {
            if (isSubmitting) {
                sendButton.disabled = true;
                return;
            }

            if (fileInput.files && fileInput.files.length > 0) {
                fileChip.innerHTML = `<strong>${fileInput.files[0].name}</strong>`;
                sendButton.disabled = false;
            } else {
                fileChip.innerHTML = `<strong>No file attached</strong>`;
                sendButton.disabled = true;
            }
        }

        function setGeneratingState() {
            isSubmitting = true;
            document.body.classList.add("is-generating");
            generationOverlay.setAttribute("aria-hidden", "false");

            messageInput.readOnly = true;
            attachButton.disabled = true;
            sendButton.disabled = true;
        }

        attachButton.addEventListener("click", () => fileInput.click());
        fileInput.addEventListener("change", updateAttachmentState);

        composerForm.addEventListener("submit", (event) => {
            if (!fileInput.files || fileInput.files.length === 0) {
                event.preventDefault();
                fileInput.reportValidity();
                return;
            }

            if (!messageInput.value.trim()) {
                event.preventDefault();
                messageInput.reportValidity();
                return;
            }

            if (isSubmitting) {
                event.preventDefault();
                return;
            }

            setGeneratingState();
        });

        updateAttachmentState();
        runTypingLoop();
    </script>
</body>
</html>
