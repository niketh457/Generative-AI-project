<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GlyphFlow Error</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/glyphflow.css">
</head>
<body>
    <div class="page-shell">
        <header class="topbar">
            <div class="brand-block">
                <h1 class="brand-mark">GlyphFlow</h1>
                <p class="brand-caption">Something interrupted the generation flow.</p>
            </div>
            <a href="/" class="status-pill"><span></span> Return home</a>
        </header>

        <main class="screen">
            <section class="error-card">
                <div class="error-inner">
                    <div class="error-mark">!</div>
                    <p class="section-label">Generation error</p>
                    <h2 class="error-title">The request could not be completed</h2>
                    <p class="error-copy">The model or file processing step returned an error. Please go back, attach a handwriting sample again, and resend the prompt.</p>
                    <div class="button-row">
                        <a href="/" class="button-secondary">Back to studio</a>
                    </div>
                </div>
            </section>
        </main>
    </div>
</body>
</html>
